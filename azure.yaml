# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: hermes-foundry-tui
services:
    hermes-foundry-agent:
        project: agent
        host: azure.ai.agent
        language: docker
        docker:
            path: Dockerfile
            context: ..
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.25"
                    memory: 0.5Gi
        startupCommand: python main.py
infra:
    provider: bicep
    path: ./infra
hooks:
    postdeploy:
        windows:
            shell: pwsh
            run: |
                $openAiUserRoleId = "5e0bd9bd-7b93-4f28-af87-19fc36ad61bd"
                $subscriptionId = azd env get-value AZURE_SUBSCRIPTION_ID 2>$null
                $aiAccountId = azd env get-value AZURE_AI_ACCOUNT_ID 2>$null
                if (-not $subscriptionId -or -not $aiAccountId) {
                    throw "AZURE_SUBSCRIPTION_ID or AZURE_AI_ACCOUNT_ID is not set in the azd environment."
                }

                $agent = azd ai agent show --output json | ConvertFrom-Json
                $agentPrincipalId = $agent.instance_identity.principal_id
                if (-not $agentPrincipalId) {
                    throw "Could not resolve hosted agent managed identity principal id."
                }

                $roleDefinitionId = "/subscriptions/$subscriptionId/providers/Microsoft.Authorization/roleDefinitions/$openAiUserRoleId"
                $query = "[?roleDefinitionId=='$roleDefinitionId'].id | [0]"
                $existing = az role assignment list `
                    --assignee-object-id $agentPrincipalId `
                    --scope $aiAccountId `
                    --fill-principal-name false `
                    --query $query `
                    -o tsv 2>$null
                if (-not $existing) {
                    az role assignment create `
                        --assignee-object-id $agentPrincipalId `
                        --assignee-principal-type ServicePrincipal `
                        --role $openAiUserRoleId `
                        --scope $aiAccountId | Out-Null
                }
        posix:
            name: postdeploy
            kind: sh
            shell: sh
            run: |
                OPENAI_USER_ROLE_ID="5e0bd9bd-7b93-4f28-af87-19fc36ad61bd"
                SUBSCRIPTION_ID="$(azd env get-value AZURE_SUBSCRIPTION_ID 2>/dev/null || true)"
                AI_ACCOUNT_ID="$(azd env get-value AZURE_AI_ACCOUNT_ID 2>/dev/null || true)"
                if [ -z "$SUBSCRIPTION_ID" ] || [ -z "$AI_ACCOUNT_ID" ]; then
                    echo "AZURE_SUBSCRIPTION_ID or AZURE_AI_ACCOUNT_ID is not set in the azd environment." >&2
                    exit 1
                fi

                AGENT_PRINCIPAL_ID="$(azd ai agent show --output json | python3 -c 'import json, sys; print(((json.load(sys.stdin).get("instance_identity") or {}).get("principal_id")) or "")')"
                if [ -z "$AGENT_PRINCIPAL_ID" ]; then
                    echo "Could not resolve hosted agent managed identity principal id." >&2
                    exit 1
                fi

                ROLE_DEFINITION_ID="/subscriptions/$SUBSCRIPTION_ID/providers/Microsoft.Authorization/roleDefinitions/$OPENAI_USER_ROLE_ID"
                EXISTING="$(az role assignment list \
                    --assignee-object-id "$AGENT_PRINCIPAL_ID" \
                    --scope "$AI_ACCOUNT_ID" \
                    --fill-principal-name false \
                    --query "[?roleDefinitionId=='$ROLE_DEFINITION_ID'].id | [0]" \
                    -o tsv 2>/dev/null || true)"
                if [ -z "$EXISTING" ]; then
                    az role assignment create \
                        --assignee-object-id "$AGENT_PRINCIPAL_ID" \
                        --assignee-principal-type ServicePrincipal \
                        --role "$OPENAI_USER_ROLE_ID" \
                        --scope "$AI_ACCOUNT_ID" >/dev/null
                fi
    predeploy:
        windows:
            shell: pwsh
            run: |
                $subscriptionId = azd env get-value AZURE_SUBSCRIPTION_ID 2>$null
                if ($subscriptionId) {
                    $tenantId = az account show --subscription $subscriptionId --query tenantId -o tsv 2>$null
                } else {
                    $tenantId = az account show --query tenantId -o tsv 2>$null
                }
                if ($tenantId) { azd env set AZURE_TENANT_ID $tenantId | Out-Null }
                pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/render-hermes-config.ps1
        posix:
            name: predeploy
            kind: sh
            shell: sh
            run: |
                SUBSCRIPTION_ID="$(azd env get-value AZURE_SUBSCRIPTION_ID 2>/dev/null || true)"
                if [ -n "$SUBSCRIPTION_ID" ]; then
                    TENANT_ID="$(az account show --subscription "$SUBSCRIPTION_ID" --query tenantId -o tsv 2>/dev/null || true)"
                else
                    TENANT_ID="$(az account show --query tenantId -o tsv 2>/dev/null || true)"
                fi
                [ -n "$TENANT_ID" ] && azd env set AZURE_TENANT_ID "$TENANT_ID" >/dev/null
                sh ./scripts/render-hermes-config.sh
    predown:
        windows:
            shell: pwsh
            run: |
                $envName = azd env get-value AZURE_ENV_NAME 2>$null
                $sub = azd env get-value AZURE_SUBSCRIPTION_ID 2>$null
                if (-not $envName) {
                    Write-Host "predown: AZURE_ENV_NAME not set; skipping model deployment cleanup."
                    return
                }
                $subArgs = @()
                if ($sub) { $subArgs = @('--subscription', $sub) }
                $accounts = az cognitiveservices account list @subArgs --query "[?tags.\`"azd-env-name\`"=='$envName'].[name,resourceGroup]" -o tsv 2>$null
                if (-not $accounts) {
                    Write-Host "predown: no Cognitive Services accounts tagged azd-env-name=$envName; nothing to clean."
                    return
                }
                foreach ($line in $accounts) {
                    if ([string]::IsNullOrWhiteSpace($line)) { continue }
                    $parts = $line -split "`t"
                    $account = $parts[0]; $rg = $parts[1]
                    $deployments = az cognitiveservices account deployment list -n $account -g $rg @subArgs --query "[].name" -o tsv 2>$null
                    foreach ($dep in $deployments) {
                        if ([string]::IsNullOrWhiteSpace($dep)) { continue }
                        Write-Host "predown: deleting model deployment '$dep' on $account ($rg)"
                        az cognitiveservices account deployment delete -n $account -g $rg --deployment-name $dep @subArgs
                        if ($LASTEXITCODE -ne 0) { Write-Host "predown: warning: failed to delete deployment '$dep' (continuing)" }
                    }
                }
        posix:
            name: predown
            kind: sh
            shell: sh
            run: |
                ENVNAME="$(azd env get-value AZURE_ENV_NAME 2>/dev/null || true)"
                SUB="$(azd env get-value AZURE_SUBSCRIPTION_ID 2>/dev/null || true)"
                if [ -z "$ENVNAME" ]; then
                    echo "predown: AZURE_ENV_NAME not set; skipping model deployment cleanup."
                    exit 0
                fi
                SUB_ARGS=""
                [ -n "$SUB" ] && SUB_ARGS="--subscription $SUB"
                ACCOUNTS="$(az cognitiveservices account list $SUB_ARGS --query "[?tags.\"azd-env-name\"=='$ENVNAME'].[name,resourceGroup]" -o tsv 2>/dev/null || true)"
                if [ -z "$ACCOUNTS" ]; then
                    echo "predown: no Cognitive Services accounts tagged azd-env-name=$ENVNAME; nothing to clean."
                    exit 0
                fi
                printf '%s\n' "$ACCOUNTS" | while IFS="$(printf '\t')" read -r ACCOUNT RG; do
                    [ -z "$ACCOUNT" ] && continue
                    DEPLOYMENTS="$(az cognitiveservices account deployment list -n "$ACCOUNT" -g "$RG" $SUB_ARGS --query "[].name" -o tsv 2>/dev/null || true)"
                    for DEP in $DEPLOYMENTS; do
                        echo "predown: deleting model deployment '$DEP' on $ACCOUNT ($RG)"
                        az cognitiveservices account deployment delete -n "$ACCOUNT" -g "$RG" --deployment-name "$DEP" $SUB_ARGS \
                            || echo "predown: warning: failed to delete deployment '$DEP' (continuing)"
                    done
                done
    prepackage:
        windows:
            shell: pwsh
            run: |
                pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/render-hermes-config.ps1
        posix:
            name: prepackage
            kind: sh
            shell: sh
            run: |
                sh ./scripts/render-hermes-config.sh
workflows:
    up:
        steps:
            - azd:
                args:
                    - provision
            - azd:
                args:
                    - package
                    - --all
            - azd:
                args:
                    - deploy
                    - --all
